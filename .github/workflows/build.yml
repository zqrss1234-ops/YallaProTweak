name: Build YallaPro Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install ldid make xz 2>&1 || true
          echo "HOMEBREW_NO_REQUIRE_TAP_TRUST=1" >> $GITHUB_ENV

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Download SDK
        run: |
          mkdir -p $HOME/theos/sdks
          curl -L -o /tmp/sdk.tar.xz \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz
          tar -xf /tmp/sdk.tar.xz -C $HOME/theos/sdks
          ls -la $HOME/theos/sdks/

      - name: Build
        run: |
          ls -la
          make clean 2>&1 || true
          make 2>&1 || true
          echo "--- looking for dylib ---"
          find /Users -name "*.dylib" -path "*/YallaPro*" 2>/dev/null || true
          find $HOME -name "*.dylib" -path "*/YallaPro*" 2>/dev/null || true
          find . -name "*.dylib" 2>/dev/null || true
          find .theos -type f 2>/dev/null || true
          ls -la .theos/obj/debug/ 2>/dev/null || true
          ls -la .theos/obj/ 2>/dev/null || true

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: YallaPro-DYLIB
          path: |
            .theos/obj/debug/YallaPro.dylib
            .theos/obj/YallaPro.dylib
            **/*.dylib
