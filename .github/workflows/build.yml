name: Build YallaPro Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install ldid make xz
          brew install libplist

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Use System SDK
        run: |
          mkdir -p $HOME/theos/sdks
          ln -sf /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk $HOME/theos/sdks/iPhoneOS16.4.sdk
          echo "Available SDKs:"
          ls -la $HOME/theos/sdks/

      - name: Build Package
        run: |
          make clean
          make package
          mkdir -p output
          find .theos -name "*.dylib" -exec cp {} output/YallaPro.dylib \;

      - name: Upload .deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YallaPro-Tweak-DEB
          path: packages/*.deb

      - name: Upload .dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YallaPro-Tweak-DYLIB
          path: output/YallaPro.dylib
