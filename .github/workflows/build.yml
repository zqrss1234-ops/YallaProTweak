name: Build YallaPro Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install ldid make xz dpkg 2>&1 || true

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Download SDK
        run: |
          mkdir -p $HOME/theos/sdks
          curl -L -o /tmp/sdk.tar.xz \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz
          tar -xf /tmp/sdk.tar.xz -C $HOME/theos/sdks
          ls -la $HOME/theos/sdks/

      - name: Build
        run: |
          export THEOS=$HOME/theos
          export PATH="$THEOS/bin:$PATH"
          echo "--- PWD ---"
          pwd
          echo "--- FILES ---"
          ls -la
          echo "--- MAKE CLEAN ---"
          make clean 2>&1 | tee /tmp/clean.log
          echo "--- MAKE ---"
          make 2>&1 | tee /tmp/build.log
          echo "--- BUILD LOG END ---"

      - name: Package
        run: |
          export THEOS=$HOME/theos
          export PATH="$THEOS/bin:$PATH"
          make package 2>&1
          mkdir -p output 2>&1
          find .theos -name "*.dylib" -exec cp {} output/YallaPro.dylib \; 2>&1

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: YallaPro-Tweak-DEB
          path: packages/*.deb

      - name: Upload .dylib
        uses: actions/upload-artifact@v4
        with:
          name: YallaPro-Tweak-DYLIB
          path: output/YallaPro.dylib

      - name: Upload Build Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/*.log
