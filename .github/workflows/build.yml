name: Build YallaPro Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ldid
        run: brew install ldid 2>&1 || true

      - name: Compile dylib
        run: |
          SDK=/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk
          CFLAGS="-isysroot $SDK -miphoneos-version-min=14.0 -fobjc-arc -framework UIKit -framework CoreGraphics -framework QuartzCore -dynamiclib -undefined dynamic_lookup"
          xcrun -sdk iphoneos clang -arch arm64 -arch arm64e $CFLAGS -o YallaPro.dylib Tweak.m 2>&1

      - name: Codesign dylib
        run: |
          ldid -S YallaPro.dylib 2>&1 || true
          ls -la YallaPro.dylib 2>&1

      - name: Create .deb
        run: |
          mkdir -p package/DEBIAN
          mkdir -p package/Library/MobileSubstrate/DynamicLibraries
          cp YallaPro.dylib package/Library/MobileSubstrate/DynamicLibraries/
          cp YallaPro.plist package/Library/MobileSubstrate/DynamicLibraries/
          cat > package/DEBIAN/control << 'EOF'
          Package: com.yallapro.tweak
          Name: Yalla Pro
          Version: 1.0.0
          Architecture: iphoneos-arm
          Description: Yalla Lite utility tool
          Maintainer: Developer
          Author: Developer
          Section: Tweaks
          Depends: mobilesubstrate (>= 0.9.5000), firmware (>= 12.0)
          EOF
          chmod 755 package/DEBIAN/control
          (brew install dpkg 2>&1 || true)
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          dpkg-deb -b package packages/YallaPro.deb 2>&1 || echo "dpkg-deb not available, skipping .deb"
          ls -la packages/ 2>&1 || true

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: YallaPro-DEB
          path: packages/*.deb

      - name: Upload .dylib
        uses: actions/upload-artifact@v4
        with:
          name: YallaPro-DYLIB
          path: YallaPro.dylib
