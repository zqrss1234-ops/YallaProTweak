name: Build YallaPro Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install ldid make xz
          brew install libplist

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Download SDK
        run: |
          mkdir -p $HOME/theos/sdks
          curl -L -o $HOME/sdk.tar.xz https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz
          tar -xf $HOME/sdk.tar.xz -C $HOME/theos/sdks
          ls -la $HOME/theos/sdks/

      - name: Build Package
        run: |
          make clean 2>&1
          make package 2>&1
          mkdir -p output 2>&1
          find .theos -name "*.dylib" -exec cp {} output/YallaPro.dylib \; 2>&1

      - name: Upload .deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YallaPro-Tweak-DEB
          path: packages/*.deb

      - name: Upload .dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YallaPro-Tweak-DYLIB
          path: output/YallaPro.dylib
