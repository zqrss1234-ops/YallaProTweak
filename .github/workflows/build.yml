name: Build YallaPro Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install ldid make xz dpkg 2>&1 || true

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Download SDK
        run: |
          mkdir -p $HOME/theos/sdks
          curl -L -o /tmp/sdk.tar.xz \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz
          tar -xf /tmp/sdk.tar.xz -C $HOME/theos/sdks
          ls -la $HOME/theos/sdks/

      - name: Build & Package
        run: |
          export THEOS=$HOME/theos
          export PATH="$THEOS/bin:$PATH"
          echo "--- FILES ---"
          ls -la
          echo "--- MAKE ---"
          make clean 2>&1
          make 2>&1
          mkdir -p output 2>&1
          echo "--- FIND DYLIB ---"
          find . -name "*.dylib" -type f 2>&1
          find .theos -name "*.dylib" -exec cp {} output/YallaPro.dylib \; 2>&1 || true
          find . -name "*.dylib" -exec cp {} output/ \; 2>&1 || true
          echo "--- OUTPUT ---"
          ls -la output/ 2>&1 || true

      - name: Upload .deb
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: YallaPro-Tweak-DEB
          path: packages/*.deb

      - name: Upload .dylib
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: YallaPro-Tweak-DYLIB
          path: output/*.dylib
