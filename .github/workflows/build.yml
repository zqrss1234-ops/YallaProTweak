name: Build YallaPro Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install ldid make xz
          brew install libplist

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Download iOS SDK
        run: |
          curl -L -o $HOME/sdk.tar.xz https://github.com/xybp888/iOS-SDKs/releases/download/iOS16.5/iPhoneOS16.5.sdk.tar.xz
          mkdir -p $HOME/theos/sdks
          tar -xf $HOME/sdk.tar.xz -C $HOME/theos/sdks

      - name: Build Package
        run: |
          make clean
          make package
          mkdir -p output
          find .theos -name "*.dylib" -exec cp {} output/YallaPro.dylib \;

      - name: Upload .deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YallaPro-Tweak-DEB
          path: packages/*.deb

      - name: Upload .dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YallaPro-Tweak-DYLIB
          path: output/YallaPro.dylib
